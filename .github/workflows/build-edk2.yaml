name: Build EDK2

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Setup Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential uuid-dev iasl git nasm python3-distutils

    - name: Clone EDK2
      run: |
        git clone https://github.com/tianocore/edk2.git
        cd edk2
        git submodule update --init

    - name: Copy edk2-libc contents to edk2
      run: |
        #git clone https://github.com/jpshivakavi/edk2-libc-jp.git
        #cd edk2-libc-jp
        ls -al
        cp -rf * ../edk2/.

    - name: Build EDK2
      run: |
        cd edk2
        . edksetup.sh
        make -C BaseTools
        cd AppPkg/Applications/Python/Python-3.6.8/
        python3 srcprep.py
        cd -
        build -t GCC5 -a X64 -b RELEASE -p AppPkg/AppPkg.dsc
        ./create_python_pkg.sh GCC5 RELEASE X64 myUEFIPy
        
    - name: List build artifacts
      run: |
        ls -R edk2/Build

    - name: Archive build artifacts
      uses: actions/upload-artifact@v2
      with:
        name: edk2-build-artifacts
        path: |
          edk2/Build/AppPkg/**/*  # Replace with the actual path to your build artifacts
        
